<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm/Sửa sản phẩm - Product Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="app-shell">
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand" th:href="@{/products}">🛒 Product Manager</a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <a th:href="@{/cart}" class="btn btn-sm btn-outline-light position-relative">
                    🛒 Giỏ hàng
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          th:if="${cartItemCount != null && cartItemCount > 0}" th:text="${cartItemCount}"></span>
                </a>
                <a th:href="@{/orders}" class="btn btn-sm btn-outline-light">📋 Đơn hàng</a>
                <span class="badge bg-light text-dark border-0" sec:authentication="name"></span>
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <button type="submit" class="btn btn-sm btn-outline-light">Đăng xuất</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="app-main">
        <div class="container d-flex justify-content-center">
            <div class="form-card app-card p-4 p-md-5 w-100">
                <h2 class="page-title mb-1" th:text="${product.id != null ? 'Sửa sản phẩm' : 'Thêm sản phẩm'}">Thêm/Sửa sản phẩm</h2>
                <p class="text-muted small mb-4">Nhập tên, giá và chọn danh mục cho sản phẩm.</p>

                <form th:action="@{/products/save}" th:object="${product}" method="post" class="mb-0">
                    <input type="hidden" th:field="*{id}"/>

                    <div class="mb-3">
                        <label class="form-label">Tên sản phẩm</label>
                        <input type="text" class="form-control" th:field="*{name}" placeholder="Ví dụ: iPhone 16"/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Giá (VNĐ)</label>
                        <input type="number" step="0.01" min="0" class="form-control" th:field="*{price}"
                               placeholder="Ví dụ: 15000000"/>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Danh mục</label>
                        <select class="form-select" th:field="*{category.id}">
                            <option value="">-- Chọn danh mục --</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between gap-2">
                        <a class="btn btn-outline-secondary" th:href="@{/products}">Quay lại danh sách</a>
                        <button type="submit" class="btn btn-success btn-pill">Lưu sản phẩm</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
