<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm - Demo Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="app-shell">
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand" th:href="@{/products}">Product Manager</a>
            <div class="ms-auto d-flex gap-2">
                <span class="badge bg-info-subtle text-dark border-0">Da dang nhap</span>
                <span class="badge bg-light text-dark border-0">JPA · MySQL · Thymeleaf</span>
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <button type="submit" class="btn btn-sm btn-outline-light">Đăng xuất</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="app-main">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12">
                    <div class="app-card p-4 p-md-5">
                        <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
                            <div>
                                <h2 class="page-title mb-0">Danh sách sản phẩm</h2>
                                <p class="text-muted small mb-0">Quản lý sản phẩm với danh mục và giá bán.</p>
                            </div>
                            <a class="btn btn-primary btn-pill" th:href="@{/products/add}">+ Thêm sản phẩm</a>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle table-products mb-0">
                                <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Tên sản phẩm</th>
                                    <th>Giá</th>
                                    <th>Danh mục</th>
                                    <th class="text-end">Thao tác</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:if="${#lists.isEmpty(products)}">
                                    <td colspan="5" class="text-center text-muted py-4">Chưa có sản phẩm nào.</td>
                                </tr>
                                <tr th:each="product : ${products}">
                                    <td th:text="${product.id}"></td>
                                    <td th:text="${product.name}"></td>
                                    <td class="price-cell"
                                        th:text="${product.price != null ? #numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT') : ''}"></td>
                                    <td>
                                        <span class="badge-category"
                                              th:text="${product.category != null ? product.category.name : 'Không có'}"></span>
                                    </td>
                                    <td class="text-end">
                                        <a class="btn btn-sm btn-outline-secondary me-1"
                                           th:href="@{|/products/edit/${product.id}|}">Sửa</a>
                                        <a class="btn btn-sm btn-danger" th:href="@{|/products/delete/${product.id}|}"
                                           onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?');">Xóa</a>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
