<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm - Demo Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container my-4">
    <h2>Danh sách sản phẩm</h2>
    <a class="btn btn-primary mb-3" th:href="@{/products/add}">Thêm mới</a>
    <table class="table table-hover">
        <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Category</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(products)}">
                <td colspan="5" class="text-center text-muted">Chưa có sản phẩm nào.</td>
            </tr>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}"></td>
                <td th:text="${product.name}"></td>
                <td th:text="${product.price != null ? #numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT') : ''}"></td>
                <td th:text="${product.category != null ? product.category.name : ''}"></td>
                <td>
                    <a class="btn btn-sm btn-secondary" th:href="@{|/products/edit/${product.id}|}">Edit</a>
                    <a class="btn btn-sm btn-danger" th:href="@{|/products/delete/${product.id}|}"
                       onclick="return confirm('Bạn có chắc muốn xóa?');">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
