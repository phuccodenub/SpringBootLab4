<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm - Product Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="app-shell">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand" th:href="@{/products}">🛒 Product Manager</a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <a th:href="@{/cart}" class="btn btn-sm btn-outline-light position-relative">
                    🛒 Giỏ hàng
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          th:if="${cartItemCount != null && cartItemCount > 0}" th:text="${cartItemCount}"></span>
                </a>
                <a th:href="@{/orders}" class="btn btn-sm btn-outline-light">📋 Đơn hàng</a>
                <span class="badge bg-light text-dark border-0" sec:authentication="name"></span>
                <span class="badge bg-info-subtle text-dark border-0" sec:authorize="hasRole('ADMIN')">ADMIN</span>
                <span class="badge bg-success-subtle text-dark border-0" sec:authorize="hasRole('USER')">USER</span>
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <button type="submit" class="btn btn-sm btn-outline-light">Đăng xuất</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="app-main">
        <div class="container">
            <!-- Flash messages -->
            <div class="alert alert-success alert-dismissible fade show" role="alert"
                 th:if="${success}" th:text="${success}">
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="alert alert-danger alert-dismissible fade show" role="alert"
                 th:if="${error}" th:text="${error}">
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row justify-content-center">
                <div class="col-12">
                    <div class="app-card p-4 p-md-5">
                        <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
                            <div>
                                <h2 class="page-title mb-0">Danh sách sản phẩm</h2>
                                <p class="text-muted small mb-0">
                                    Tổng: <strong th:text="${totalItems}">0</strong> sản phẩm
                                </p>
                            </div>
                            <a class="btn btn-primary btn-pill" th:href="@{/products/add}"
                               sec:authorize="hasRole('ADMIN')">+ Thêm sản phẩm</a>
                        </div>

                        <!-- SEARCH / FILTER / SORT FORM -->
                        <form method="get" th:action="@{/products}" class="row g-2 mb-4 align-items-end">
                            <div class="col-md-4">
                                <label class="form-label small fw-semibold">Tìm kiếm theo tên</label>
                                <input type="text" class="form-control" name="keyword"
                                       th:value="${keyword}" placeholder="Nhập tên sản phẩm...">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-semibold">Danh mục</label>
                                <select class="form-select" name="categoryId">
                                    <option value="">-- Tất cả danh mục --</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.id}" th:text="${cat.name}"
                                            th:selected="${categoryId != null && cat.id == categoryId}"></option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small fw-semibold">Sắp xếp</label>
                                <select class="form-select" name="sort">
                                    <option value="">Mặc định</option>
                                    <option value="price_asc" th:selected="${sort == 'price_asc'}">Giá tăng dần ↑</option>
                                    <option value="price_desc" th:selected="${sort == 'price_desc'}">Giá giảm dần ↓</option>
                                    <option value="name_asc" th:selected="${sort == 'name_asc'}">Tên A-Z</option>
                                    <option value="name_desc" th:selected="${sort == 'name_desc'}">Tên Z-A</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-success w-100">🔍 Tìm kiếm</button>
                            </div>
                        </form>

                        <!-- Active filters display -->
                        <div class="mb-3" th:if="${keyword != null && !keyword.isEmpty()} or ${categoryId != null} or ${sort != null && !sort.isEmpty()}">
                            <span class="small text-muted me-2">Đang lọc:</span>
                            <span class="badge bg-primary me-1" th:if="${keyword != null && !keyword.isEmpty()}">
                                Từ khóa: "<span th:text="${keyword}"></span>"
                            </span>
                            <span class="badge bg-secondary me-1" th:if="${categoryId != null}">
                                Danh mục: <span th:each="cat : ${categories}" th:if="${cat.id == categoryId}" th:text="${cat.name}"></span>
                            </span>
                            <span class="badge bg-info me-1" th:if="${sort != null && !sort.isEmpty()}"
                                  th:text="${sort == 'price_asc' ? 'Giá tăng dần' : (sort == 'price_desc' ? 'Giá giảm dần' : (sort == 'name_asc' ? 'Tên A-Z' : 'Tên Z-A'))}">
                            </span>
                            <a th:href="@{/products}" class="btn btn-sm btn-outline-danger">✕ Xóa bộ lọc</a>
                        </div>

                        <!-- PRODUCT TABLE -->
                        <div class="table-responsive">
                            <table class="table table-hover align-middle table-products mb-0">
                                <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Tên sản phẩm</th>
                                    <th>Giá (VNĐ)</th>
                                    <th>Danh mục</th>
                                    <th class="text-center">Giỏ hàng</th>
                                    <th class="text-end" sec:authorize="hasRole('ADMIN')">Thao tác</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:if="${#lists.isEmpty(products)}">
                                    <td colspan="6" class="text-center text-muted py-4">Không tìm thấy sản phẩm nào.</td>
                                </tr>
                                <tr th:each="product : ${products}">
                                    <td th:text="${product.id}"></td>
                                    <td>
                                        <strong th:text="${product.name}"></strong>
                                    </td>
                                    <td class="price-cell"
                                        th:text="${product.price != null ? #numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT') + ' ₫' : ''}"></td>
                                    <td>
                                        <span class="badge-category"
                                              th:text="${product.category != null ? product.category.name : 'Không có'}"></span>
                                    </td>
                                    <td class="text-center">
                                        <form th:action="@{/cart/add}" method="post" class="d-inline-flex align-items-center gap-1">
                                            <input type="hidden" name="productId" th:value="${product.id}">
                                            <input type="number" name="quantity" value="1" min="1" max="99"
                                                   class="form-control form-control-sm" style="width: 60px;">
                                            <button type="submit" class="btn btn-sm btn-success" title="Thêm vào giỏ">🛒+</button>
                                        </form>
                                    </td>
                                    <td class="text-end" sec:authorize="hasRole('ADMIN')">
                                        <a class="btn btn-sm btn-outline-secondary me-1"
                                           th:href="@{|/products/edit/${product.id}|}">Sửa</a>
                                        <form th:action="@{|/products/delete/${product.id}|}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-danger"
                                                    onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?');">Xóa</button>
                                        </form>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <!-- PAGINATION -->
                        <nav th:if="${totalPages > 1}" class="mt-4">
                            <ul class="pagination justify-content-center mb-0">
                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                    <a class="page-link"
                                       th:href="@{/products(keyword=${keyword}, categoryId=${categoryId}, sort=${sort}, page=${currentPage - 1})}">
                                        « Trước
                                    </a>
                                </li>
                                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                                    th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link"
                                       th:href="@{/products(keyword=${keyword}, categoryId=${categoryId}, sort=${sort}, page=${i})}"
                                       th:text="${i + 1}"></a>
                                </li>
                                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                                    <a class="page-link"
                                       th:href="@{/products(keyword=${keyword}, categoryId=${categoryId}, sort=${sort}, page=${currentPage + 1})}">
                                        Sau »
                                    </a>
                                </li>
                            </ul>
                        </nav>

                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
