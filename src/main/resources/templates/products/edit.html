<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/products}">Product Manager</a>
        <div class="navbar-nav flex-row gap-2">
            <a class="nav-link text-white" th:href="@{/products}">Home</a>
            <a class="nav-link text-white active" th:href="@{/products}">Products</a>
        </div>
    </div>
</nav>

<main class="container my-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold">Sửa sản phẩm</div>
                <div class="card-body">
                    <form th:action="@{'/products/' + ${productId}}" th:object="${productForm}" method="post" enctype="multipart/form-data">
                        <input type="hidden" th:field="*{existingImageFileName}">

                        <div class="mb-3">
                            <label class="form-label" for="name">Tên sản phẩm</label>
                            <input id="name" class="form-control" th:field="*{name}" required maxlength="200">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="price">Giá sản phẩm</label>
                            <input id="price" type="number" min="1" max="9999999" class="form-control" th:field="*{price}" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ảnh hiện tại</label>
                            <div>
                                <img th:src="@{'/uploads/' + ${productForm.existingImageFileName}}" alt="current image" class="product-image">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="imageFile">Đổi hình ảnh (không bắt buộc)</label>
                            <input id="imageFile" type="file" accept="image/*" class="form-control" th:field="*{imageFile}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('imageFile')}" th:errors="*{imageFile}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="categoryKey">Danh mục</label>
                            <select id="categoryKey" class="form-select" th:field="*{categoryKey}" required>
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="category : ${categories}" th:value="${category.key}" th:text="${category.label}"></option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('categoryKey')}" th:errors="*{categoryKey}"></div>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-primary" type="submit">Save</button>
                            <a class="btn btn-outline-secondary" th:href="@{/products}">Back</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
