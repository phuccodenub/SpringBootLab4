<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/products}">Product Manager</a>
        <div class="navbar-nav flex-row gap-2">
            <a class="nav-link text-white" th:href="@{/products}">Home</a>
            <a class="nav-link text-white active" th:href="@{/products}">Products</a>
        </div>
    </div>
</nav>

<main class="container my-4">
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
    <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
                <a class="btn btn-primary" th:href="@{/products/create}">Create New Product</a>
                <form class="d-flex gap-2" method="get" th:action="@{/products}">
                    <input class="form-control" type="text" name="q" placeholder="Search" th:value="${query}">
                    <button class="btn btn-success" type="submit">Search</button>
                </form>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Image</th>
                        <th>Category Name</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="6" class="text-center text-muted py-4">Chưa có sản phẩm nào.</td>
                    </tr>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.id}"></td>
                        <td th:text="${product.name}"></td>
                        <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}"></td>
                        <td>
                            <img th:src="@{'/uploads/' + ${product.imageFileName}}" alt="product image" class="product-image">
                        </td>
                        <td th:text="${product.categoryLabel}"></td>
                        <td class="d-flex gap-2">
                            <a class="btn btn-sm btn-secondary" th:href="@{'/products/' + ${product.id} + '/edit'}">Edit</a>
                            <form th:action="@{'/products/' + ${product.id} + '/delete'}" method="post">
                                <button class="btn btn-sm btn-danger" type="submit"
                                        onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
