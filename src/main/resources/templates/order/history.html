<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đơn hàng - Product Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="app-shell">
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand" th:href="@{/products}">🛒 Product Manager</a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <a th:href="@{/cart}" class="btn btn-sm btn-outline-light position-relative">
                    🛒 Giỏ hàng
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          th:if="${cartItemCount != null && cartItemCount > 0}" th:text="${cartItemCount}"></span>
                </a>
                <a th:href="@{/orders}" class="btn btn-sm btn-light">📋 Đơn hàng</a>
                <span class="badge bg-light text-dark border-0" sec:authentication="name"></span>
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <button type="submit" class="btn btn-sm btn-outline-light">Đăng xuất</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="app-main">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="app-card p-4 p-md-5">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div>
                                <h2 class="page-title mb-0">📋 Lịch sử đơn hàng</h2>
                                <p class="text-muted small mb-0">Danh sách các đơn hàng của bạn.</p>
                            </div>
                            <a class="btn btn-outline-primary" th:href="@{/products}">← Tiếp tục mua sắm</a>
                        </div>

                        <!-- Empty orders -->
                        <div th:if="${#lists.isEmpty(orders)}" class="text-center py-5">
                            <p class="text-muted fs-1">📋</p>
                            <p class="text-muted">Bạn chưa có đơn hàng nào.</p>
                            <a th:href="@{/products}" class="btn btn-primary">Mua sắm ngay</a>
                        </div>

                        <!-- Order list -->
                        <div th:if="${!#lists.isEmpty(orders)}">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                    <tr>
                                        <th>Mã đơn</th>
                                        <th>Ngày đặt</th>
                                        <th class="text-center">Số sản phẩm</th>
                                        <th class="text-end">Tổng tiền</th>
                                        <th class="text-center">Trạng thái</th>
                                        <th class="text-center">Chi tiết</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="order : ${orders}">
                                        <td><strong>#<span th:text="${order.id}"></span></strong></td>
                                        <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                                        <td class="text-center" th:text="${order.orderDetails.size()}"></td>
                                        <td class="text-end price-cell fw-bold"
                                            th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                        <td class="text-center">
                                            <span class="badge bg-success" th:text="${order.status}"></span>
                                        </td>
                                        <td class="text-center">
                                            <a class="btn btn-sm btn-outline-primary"
                                               th:href="@{|/orders/${order.id}|}">Xem</a>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
