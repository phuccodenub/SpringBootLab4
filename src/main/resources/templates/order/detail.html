<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết đơn hàng - Product Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="app-shell">
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand" th:href="@{/products}">🛒 Product Manager</a>
            <div class="ms-auto d-flex align-items-center gap-2">
                <a th:href="@{/cart}" class="btn btn-sm btn-outline-light position-relative">
                    🛒 Giỏ hàng
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          th:if="${cartItemCount != null && cartItemCount > 0}" th:text="${cartItemCount}"></span>
                </a>
                <a th:href="@{/orders}" class="btn btn-sm btn-outline-light">📋 Đơn hàng</a>
                <span class="badge bg-light text-dark border-0" sec:authentication="name"></span>
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <button type="submit" class="btn btn-sm btn-outline-light">Đăng xuất</button>
                </form>
            </div>
        </div>
    </nav>

    <main class="app-main">
        <div class="container">
            <!-- Flash messages -->
            <div class="alert alert-success alert-dismissible fade show" role="alert"
                 th:if="${success}" th:text="${success}">
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="app-card p-4 p-md-5">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div>
                                <h2 class="page-title mb-1">
                                    ✅ Đơn hàng #<span th:text="${order.id}"></span>
                                </h2>
                                <p class="text-muted small mb-0">
                                    Ngày đặt: <span th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}"></span>
                                    · Trạng thái:
                                    <span class="badge bg-success" th:text="${order.status}"></span>
                                </p>
                            </div>
                            <a class="btn btn-outline-primary" th:href="@{/orders}">← Lịch sử đơn hàng</a>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Sản phẩm</th>
                                    <th class="text-end">Đơn giá</th>
                                    <th class="text-center">Số lượng</th>
                                    <th class="text-end">Thành tiền</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="detail, iterStat : ${order.orderDetails}">
                                    <td th:text="${iterStat.count}"></td>
                                    <td><strong th:text="${detail.productName}"></strong></td>
                                    <td class="text-end"
                                        th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                    <td class="text-center" th:text="${detail.quantity}"></td>
                                    <td class="text-end price-cell fw-bold"
                                        th:text="${#numbers.formatDecimal(detail.subtotal, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                </tr>
                                </tbody>
                                <tfoot>
                                <tr class="table-warning">
                                    <td colspan="4" class="text-end fw-bold fs-5">TỔNG CỘNG:</td>
                                    <td class="text-end fw-bold fs-5 text-danger"
                                        th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                </tr>
                                </tfoot>
                            </table>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/products}" class="btn btn-outline-secondary">← Tiếp tục mua sắm</a>
                            <a th:href="@{/orders}" class="btn btn-primary">📋 Xem tất cả đơn hàng</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
